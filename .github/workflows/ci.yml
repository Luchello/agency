name: agency-ci

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts syntax
        run: |
          set -e
          files=$(find . -type f -name "*.sh")
          if [ -n "$files" ]; then
            echo "$files" | xargs -r -n1 bash -n
          fi

      - name: Validate JSON files
        run: |
          set -e
          python3 - <<'PY'
          import json,glob
          for p in glob.glob('**/*.json', recursive=True):
              if '/node_modules/' in p:
                  continue
              with open(p,'r',encoding='utf-8') as f:
                  json.load(f)
          print('JSON validation OK')
          PY
